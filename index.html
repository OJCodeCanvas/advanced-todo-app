<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFlow — Advanced Todo App</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Toast Container -->
  <div id="toast-container"></div>

  <div class="app-wrapper">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <div class="logo-icon">
            <i class="fas fa-bolt"></i>
          </div>
          <span class="logo-text">TaskFlow</span>
        </div>
        <button class="sidebar-close" id="sidebar-close">
          <i class="fas fa-times"></i>
        </button>
      </div>

      <nav class="sidebar-nav">
        <button class="nav-item active" data-category="all">
          <i class="fas fa-inbox"></i>
          <span>All Tasks</span>
          <span class="nav-count" id="count-all">0</span>
        </button>
        <button class="nav-item" data-category="today">
          <i class="fas fa-calendar-day"></i>
          <span>Today</span>
          <span class="nav-count" id="count-today">0</span>
        </button>
        <button class="nav-item" data-category="upcoming">
          <i class="fas fa-calendar-week"></i>
          <span>Upcoming</span>
          <span class="nav-count" id="count-upcoming">0</span>
        </button>
        <button class="nav-item" data-category="overdue">
          <i class="fas fa-exclamation-triangle"></i>
          <span>Overdue</span>
          <span class="nav-count" id="count-overdue">0</span>
        </button>
      </nav>

      <div class="sidebar-section">
        <h3 class="section-title">Categories</h3>
        <div class="category-list" id="category-list">
          <button class="nav-item" data-category="work">
            <span class="cat-dot" style="background: #0066ff"></span>
            <span>Work</span>
            <span class="nav-count" id="count-work">0</span>
          </button>
          <button class="nav-item" data-category="personal">
            <span class="cat-dot" style="background: #a855f7"></span>
            <span>Personal</span>
            <span class="nav-count" id="count-personal">0</span>
          </button>
          <button class="nav-item" data-category="health">
            <span class="cat-dot" style="background: #22c55e"></span>
            <span>Health</span>
            <span class="nav-count" id="count-health">0</span>
          </button>
          <button class="nav-item" data-category="learning">
            <span class="cat-dot" style="background: #f59e0b"></span>
            <span>Learning</span>
            <span class="nav-count" id="count-learning">0</span>
          </button>
        </div>
      </div>

      <div class="sidebar-footer">
        <div class="progress-section">
          <div class="progress-header">
            <span>Daily Progress</span>
            <span id="progress-percent">0%</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
          </div>
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <!-- Top Bar -->
      <div class="topbar">
        <button class="menu-btn" id="menu-btn">
          <i class="fas fa-bars"></i>
        </button>
        <div class="topbar-title">
          <h1 id="view-title">All Tasks</h1>
          <p id="view-subtitle" class="subtitle">Manage everything in one place</p>
        </div>
        <div class="topbar-actions">
          <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="search" placeholder="Search tasks...">
          </div>
          <button class="icon-btn" id="theme-toggle" title="Toggle theme">
            <i class="fas fa-moon"></i>
          </button>
          <button class="icon-btn" id="sort-btn" title="Sort tasks">
            <i class="fas fa-arrow-down-short-wide"></i>
          </button>
          <div class="sort-dropdown" id="sort-dropdown">
            <button data-sort="newest"><i class="fas fa-clock"></i> Newest First</button>
            <button data-sort="oldest"><i class="fas fa-clock-rotate-left"></i> Oldest First</button>
            <button data-sort="priority"><i class="fas fa-flag"></i> Priority</button>
            <button data-sort="dueDate"><i class="fas fa-calendar"></i> Due Date</button>
            <button data-sort="alpha"><i class="fas fa-arrow-down-a-z"></i> Alphabetical</button>
          </div>
        </div>
      </div>

      <!-- Add Task Area -->
      <div class="add-task-area">
        <div class="add-task-row">
          <div class="add-task-input-wrap">
            <i class="fas fa-plus"></i>
            <input type="text" id="task-input" placeholder="Add a new task...">
          </div>
          <button class="add-task-expand" id="add-expand-btn">
            <i class="fas fa-chevron-down"></i>
          </button>
        </div>
        <div class="add-task-details" id="add-details">
          <div class="detail-row">
            <div class="detail-field">
              <label><i class="fas fa-calendar"></i> Due Date</label>
              <input type="date" id="due-date">
            </div>
            <div class="detail-field">
              <label><i class="fas fa-flag"></i> Priority</label>
              <div class="priority-picker" id="priority-picker">
                <button class="priority-opt" data-value="low" title="Low">
                  <i class="fas fa-flag"></i>
                </button>
                <button class="priority-opt selected" data-value="medium" title="Medium">
                  <i class="fas fa-flag"></i>
                </button>
                <button class="priority-opt" data-value="high" title="High">
                  <i class="fas fa-flag"></i>
                </button>
              </div>
            </div>
            <div class="detail-field">
              <label><i class="fas fa-tag"></i> Category</label>
              <select id="category-select">
                <option value="work">Work</option>
                <option value="personal">Personal</option>
                <option value="health">Health</option>
                <option value="learning">Learning</option>
              </select>
            </div>
          </div>
          <div class="detail-actions">
            <button class="btn-cancel" id="add-cancel-btn">Cancel</button>
            <button class="btn-add" id="add-btn">
              <i class="fas fa-plus"></i> Add Task
            </button>
          </div>
        </div>
      </div>

      <!-- Filter Chips -->
      <div class="filter-chips">
        <button class="chip active" data-status="all">All</button>
        <button class="chip" data-status="active">
          <i class="fas fa-circle"></i> Active
        </button>
        <button class="chip" data-status="completed">
          <i class="fas fa-check-circle"></i> Completed
        </button>
      </div>

      <!-- Task List -->
      <div class="task-list-wrapper">
        <ul id="task-list" class="task-list"></ul>
        <div class="empty-state" id="empty-state">
          <div class="empty-icon">
            <i class="fas fa-clipboard-list"></i>
          </div>
          <h3 id="empty-title">No tasks yet</h3>
          <p id="empty-subtitle">Add your first task to get started</p>
        </div>
      </div>

      <!-- Bottom Bar -->
      <div class="bottombar" id="bottombar">
        <span id="task-count">0 tasks</span>
        <div class="bottombar-actions">
          <button id="clear-completed" class="text-btn">
            <i class="fas fa-broom"></i> Clear completed
          </button>
        </div>
      </div>
    </main>
  </div>

  <!-- Edit Modal -->
  <div class="modal-overlay" id="edit-modal">
    <div class="modal">
      <div class="modal-header">
        <h2>Edit Task</h2>
        <button class="modal-close" id="modal-close"><i class="fas fa-times"></i></button>
      </div>
      <div class="modal-body">
        <div class="modal-field">
          <label>Task Name</label>
          <input type="text" id="edit-text">
        </div>
        <div class="modal-row">
          <div class="modal-field">
            <label>Due Date</label>
            <input type="date" id="edit-date">
          </div>
          <div class="modal-field">
            <label>Priority</label>
            <select id="edit-priority">
              <option value="low">Low</option>
              <option value="medium">Medium</option>
              <option value="high">High</option>
            </select>
          </div>
          <div class="modal-field">
            <label>Category</label>
            <select id="edit-category">
              <option value="work">Work</option>
              <option value="personal">Personal</option>
              <option value="health">Health</option>
              <option value="learning">Learning</option>
            </select>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" id="edit-cancel">Cancel</button>
        <button class="btn-add" id="edit-save"><i class="fas fa-check"></i> Save Changes</button>
      </div>
    </div>
  </div>

  <!-- Delete Confirm Modal -->
  <div class="modal-overlay" id="delete-modal">
    <div class="modal modal-sm">
      <div class="modal-header">
        <h2>Delete Task</h2>
        <button class="modal-close" id="delete-modal-close"><i class="fas fa-times"></i></button>
      </div>
      <div class="modal-body">
        <p>Are you sure you want to delete this task? This action cannot be undone.</p>
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" id="delete-cancel">Cancel</button>
        <button class="btn-delete" id="delete-confirm"><i class="fas fa-trash"></i> Delete</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
